name: chameleon_mecha
description: "Chameleon Mecha - A multiplayer prop hunt game built with Flutter & Flame"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.22.0
  web_socket_channel: ^3.0.1
  google_fonts: ^6.2.1
  shared:
    path: ../shared
  chameleon_server:
    path: ../chameleon_server

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
